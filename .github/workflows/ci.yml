name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint (oxlint)
        run: bunx oxlint

      - name: Format check (prettier)
        run: bunx prettier --check "**/*.{ts,tsx,css,json,md,mdx}"

      - name: Build
        run: bun run build
